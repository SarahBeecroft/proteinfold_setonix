params {
    // Number of GCDs per process
    boltz_gcds      = 1
    colabfold_gcds  = 1
    alphafold2_gcds = 1
    esmfold_gcds    = 1

    // ---- Alphafold2 databases / params ----
    alphafold2_db                = '/scratch/references/alphafold_feb2024/databases'
    alphafold2_bfd_path          = '/scratch/references/alphafold_feb2024/databases/bfd/*'
    alphafold2_small_bfd_path    = '/scratch/references/alphafold_feb2024/databases/small_bfd/*'
    alphafold2_params_path       = '/scratch/references/alphafold_feb2024/databases/params/*'
    alphafold2_mgnify_path       = '/scratch/references/alphafold_feb2024/databases/mgnify/*'
    alphafold2_pdb70_path        = '/scratch/references/alphafold_feb2024/databases/pdb70/**'
    alphafold2_pdb_mmcif_path    = '/scratch/references/alphafold_feb2024/databases/pdb_mmcif/mmcif_files'
    alphafold2_pdb_obsolete_path = '/scratch/references/alphafold_feb2024/databases/pdb_mmcif/obsolete.dat'
    alphafold2_uniref30_path     = '/scratch/references/alphafold_feb2024/databases/uniref30/*'
    alphafold2_uniref90_path     = '/scratch/references/alphafold_feb2024/databases/uniref90/*'
    alphafold2_pdb_seqres_path   = '/scratch/references/alphafold_feb2024/databases/pdb_seqres/*'
    alphafold2_uniprot_path      = '/scratch/references/alphafold_feb2024/databases/uniprot/*'

    // ---- ColabFold databases / params ----
    colabfold_db = '/scratch/references/colabfold_jun2024/database'
    colabfold_alphafold2_params_path = '/scratch/references/colabfold_jun2024/database/params/*'
    colabfold_envdb_path    = '/scratch/references/colabfold_jun2024/database/colabfold_envdb_202108*'
    colabfold_uniref30_path = '/scratch/references/colabfold_jun2024/database/uniref30_2302*'
    colabfold_use_gpu_relax = true

    // ---- ESMFold databases / params ----
    esmfold_3B_v1 = '/scratch/references/esmfold/models/hub/checkpoints/esmfold_3B_v1.pt'
    esm2_t36_3B_UR50D = '/scratch/references/esmfold/models/hub/checkpoints/esm2_t36_3B_UR50D.pt'
    esm2_t36_3B_UR50D_contact_regression = '/scratch/references/esmfold/models/hub/checkpoints/esm2_t36_3B_UR50D_contact_regression.pt'
    esmfold_db = '/scratch/references/esmfold/models/hub/checkpoints'
    esmfold_params_path = '/scratch/references/esmfold/models/hub/checkpoints'

    // ---- BOLTZ databases / params ----
    boltz_db = '/scratch/references/boltz'
    boltz_ccd_path = '/scratch/references/boltz/ccd.pkl'
    boltz_model_path = '/scratch/references/boltz/boltz1_conf.ckpt'
    boltz2_aff_path = '/scratch/references/boltz/boltz2_aff.ckpt'
    boltz2_conf_path = '/scratch/references/boltz/boltz2_conf.ckpt'
    boltz2_mols_path = '/scratch/references/boltz/mols/'
    boltz_use_kernels = false
}

process {
    withName: 'RUN_BOLTZ|BOLTZ_FASTA' {
        // container        = 'quay.io/pawsey/boltz2:v2.2.1'
        container = 'file:///scratch/pawsey0001/sbeecroft/nf_singularity_cache/boltz_v2.2.1_rocm6.4.sif'
        queue            = 'gpu'
        clusterOptions   = "--account=${System.getenv('PAWSEY_PROJECT')}-gpu --nodes=1 --ntasks=1 --gres=gpu:${params.boltz_gcds}"
        time             = '1h'
        //containerOptions = "--env BOLTZ_CACHE_DIR=/scratch/references/boltz_v2.0.3/cache"
        cpus = null
        memory = null
    }

    withName: 'COLABFOLD_BATCH' {
        //container      = 'quay.io/pawsey/colabfold:rocm6.2.4'
        //container = 'file:///scratch/pawsey0001/sbeecroft/nf_singularity_cache/quay.io-pawsey-colabfold-rocm6.2.4.img'
        //container = 'file:///scratch/pawsey0001/sbeecroft/colab_testing/colabfold_rocm6.2.4.sif'
        container= 'file:///scratch/pawsey0001/sbeecroft/nf_singularity_cache/colabfold_rocm6_cpuTF.sif'
        queue          = 'gpu'
        clusterOptions = "--account=${System.getenv('PAWSEY_PROJECT')}-gpu --nodes=1 --ntasks=1 --gres=gpu:${params.colabfold_gcds}"
        time           = '1h'
        //containerOptions = '--env TF_FORCE_UNIFIED_MEMORY="0"  --env XLA_PYTHON_CLIENT_MEM_FRACTION="4.0" --env XLA_PYTHON_CLIENT_ALLOCATOR="platform" --env TF_FORCE_GPU_ALLOW_GROWTH="true" --env XLA_FLAGS="--xla_gpu_autotune_level=0" --env HIP_VISIBLE_DEVICES="0" --env JAX_COMPILATION_CACHE_DIR=/scratch/pawsey0001/sbeecroft/colab_testing/jax_cache'
        containerOptions = '--env TF_FORCE_UNIFIED_MEMORY="1"  --env XLA_PYTHON_CLIENT_MEM_FRACTION="4.0" --env XLA_PYTHON_CLIENT_ALLOCATOR="platform" --env TF_FORCE_GPU_ALLOW_GROWTH="true" --env HIP_VISIBLE_DEVICES="0" --env JAX_COMPILATION_CACHE_DIR=/scratch/pawsey0001/sbeecroft/colab_testing/jax_cache'
        cpus = null
        memory = null
    }

    withName: 'RUN_ALPHAFOLD2|RUN_ALPHAFOLD2_MSA|RUN_ALPHAFOLD2_PRED' {
        ///container      = 'quay.io/pawsey/alphafold2-amd-gpu:v2.3.2_rocm6.2.4'
        container = 'file:///scratch/pawsey0001/sbeecroft/nf_singularity_cache/af2_proteinfold.sif'
        queue          = 'gpu-highmem'
        clusterOptions = "--account=${System.getenv('PAWSEY_PROJECT')}-gpu --nodes=1 --gres=gpu:${params.alphafold2_gcds}"
        time           = '2h'
        containerOptions = '--env XLA_FLAGS="--xla_gpu_autotune_level=0" --env HIP_VISIBLE_DEVICES="0"'
        cpus = null
        memory = null
    }

    withName: 'RUN_ESMFOLD' {
        //container      = 'quay.io/pawsey/esmfold_openfold:rocm6.3.3'
        container = 'file:///scratch/pawsey0001/sbeecroft/nf_singularity_cache/esmfold_openfold_rocm6.3.3.sif'
        queue          = 'gpu'
        clusterOptions = "--account=${System.getenv('PAWSEY_PROJECT')}-gpu --nodes=1 --gres=gpu:${params.esmfold_gcds}"
        time           = '1h'
        //containerOptions = "--env TORCH_HOME=${launchDir}/esmfold/esmfold_cache/torch"
        containerOptions = "--env TORCH_HOME=/scratch/references/esmfold/models --env TRITON_CACHE_DIR=/tmp/triton_cache --env XDG_CACHE_HOME=/tmp"
        cpus = null
        memory = null
        ext.args = ''
    }
}